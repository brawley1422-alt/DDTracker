<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DD Programs">
<title>DD Programs '26</title>
<style>
:root {
  --bg: #0a0d14;
  --bg2: #12161f;
  --bg3: #1a1f2e;
  --border: #232d42;
  --text: #c8d8f0;
  --muted: #4a5c7a;
  --white: #eef4ff;
  --amber: #f0a500;
  --green: #22c55e;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --pink: #f472b6;
  --red: #f87171;
  --tab-h: 56px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── LAYOUT SHELL ── */
#shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-top: var(--sat);
}

/* ── TOP NAV ── */
#topnav {
  flex-shrink: 0;
  background: rgba(10,13,20,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 16px 8px;
  border-bottom: 0.5px solid var(--border);
}

.nav-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.5px;
  line-height: 1;
}

.nav-title em { font-style: normal; color: var(--amber); }

.nav-subtitle {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.3px;
}

.nav-stats {
  display: flex;
  gap: 14px;
  margin-top: 10px;
}

.nstat {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  background: var(--bg3);
  border-radius: 20px;
  border: 0.5px solid var(--border);
}

.nstat-val {
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.nstat-val.a { color: var(--amber); }
.nstat-val.g { color: var(--green); }

.nstat-lbl {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

/* ── FILTER CHIPS ── */
#chips {
  flex-shrink: 0;
  display: flex;
  gap: 7px;
  padding: 10px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  scrollbar-width: none;
}
#chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-touch-callout: none;
  user-select: none;
}
.chip.on { background: var(--amber); border-color: var(--amber); color: #050300; }

/* ── SCROLL AREA ── */
#scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 0 12px calc(var(--tab-h) + var(--sab) + 16px);
}

/* ── SECTION HEADER ── */
.sec-head {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 18px 4px 8px;
}

/* ── PROGRAM CARD ── */
.card {
  background: var(--bg2);
  border-radius: 14px;
  border: 0.5px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}

.card-accent {
  height: 3px;
}

.card-header {
  padding: 12px 14px 10px;
  border-bottom: 0.5px solid var(--border);
}

.card-top-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
  flex: 1;
}

.card-sub-text {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}

.badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}

.b-wbc    { background: rgba(96,165,250,.12); color: #93c5fd; }
.b-xp     { background: rgba(240,165,0,.12);  color: var(--amber); }
.b-affinity { background: rgba(167,139,250,.12); color: var(--purple); }
.b-themed { background: rgba(244,114,182,.12); color: var(--pink); }
.b-multi  { background: rgba(34,197,94,.12);   color: var(--green); }
.b-corner { background: rgba(251,146,60,.12);  color: #fb923c; }

/* PROGRESS */
.prog-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 5px;
}

.prog-cur  { font-size: 13px; font-weight: 600; color: var(--white); font-variant-numeric: tabular-nums; }
.prog-max  { font-size: 11px; color: var(--muted); }
.prog-pct  { font-size: 18px; font-weight: 700; color: var(--amber); font-variant-numeric: tabular-nums; }

.track {
  height: 5px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: visible;
  position: relative;
  margin-bottom: 4px;
}

.fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.tick {
  position: absolute;
  top: -3px;
  width: 2px;
  height: 11px;
  background: var(--bg2);
  border-radius: 1px;
  transform: translateX(-50%);
}

/* REWARD PILLS */
.rewards {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}

.rw {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  border: 0.5px solid var(--border);
  background: var(--bg3);
  color: var(--text);
}
.rw.hit { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.3); color: var(--green); }
.rw.next { border-color: var(--amber); color: var(--amber); }
.rw-ovr { font-size: 12px; font-weight: 700; }
.rw.diamond .rw-ovr { color: var(--purple); }
.rw.gold    .rw-ovr { color: var(--amber); }
.rw.rd      .rw-ovr { color: var(--pink); }
.rw.hit     .rw-ovr { color: var(--green); }

/* EXPAND TOGGLE */
.card-expand-btn {
  width: 100%;
  padding: 10px 14px;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  -webkit-touch-callout: none;
  user-select: none;
}

.expand-label { display: flex; align-items: center; gap: 6px; }
.expand-count {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
  border: 0.5px solid var(--border);
}
.expand-chevron {
  transition: transform 0.2s;
  font-size: 11px;
}
.expand-chevron.open { transform: rotate(180deg); }

/* MISSIONS */
.missions-wrap {
  display: none;
  border-top: 0.5px solid var(--border);
}
.missions-wrap.open { display: block; }

.mg {
  padding: 10px 14px 6px;
  border-bottom: 0.5px solid var(--border);
}
.mg:last-child { border-bottom: none; }

.mg-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

/* MISSION ROW — big touch targets */
.mission {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  -webkit-touch-callout: none;
  user-select: none;
  min-height: 44px;
}
.mission:last-child { border-bottom: none; }
.mission.dm .m-lbl { text-decoration: line-through; color: var(--muted); }

.m-chk {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--bg3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.mission.dm .m-chk { background: var(--green); border-color: var(--green); }

.m-lbl {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}

.m-pts {
  font-size: 12px;
  font-weight: 700;
  color: var(--amber);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.m-rep {
  font-size: 9px;
  font-weight: 700;
  color: var(--blue);
  background: rgba(96,165,250,.1);
  padding: 2px 5px;
  border-radius: 4px;
  margin-left: 4px;
  white-space: nowrap;
}

/* XP MANUAL INPUT */
.xp-section {
  padding: 12px 14px;
  border-top: 0.5px solid var(--border);
}

.xp-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.xp-in {
  font-size: 15px;
  font-weight: 600;
  font-family: -apple-system, system-ui;
  width: 120px;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  outline: none;
  text-align: center;
  font-variant-numeric: tabular-nums;
  -webkit-appearance: none;
}
.xp-in:focus { border-color: var(--amber); }

.xp-lbl { font-size: 13px; color: var(--muted); font-weight: 500; }

.quick-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.qb {
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  padding: 7px 13px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
  background: var(--bg3);
  color: var(--muted);
  cursor: pointer;
  min-height: 34px;
  -webkit-touch-callout: none;
  user-select: none;
}
.qb:active { background: var(--border); }

/* NOTES */
.notes-section {
  padding: 10px 14px 12px;
  border-top: 0.5px solid var(--border);
}

.notes-in {
  width: 100%;
  font-size: 13px;
  font-family: -apple-system, system-ui;
  padding: 8px 10px;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  outline: none;
  resize: none;
  height: 36px;
  -webkit-appearance: none;
  transition: height 0.2s;
}
.notes-in:focus { height: 64px; border-color: var(--border); }
.notes-in::placeholder { color: var(--muted); }

/* ── BOTTOM TAB BAR ── */
#tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(var(--tab-h) + var(--sab));
  background: rgba(10,13,20,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding-bottom: var(--sab);
  z-index: 100;
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.15s;
  -webkit-touch-callout: none;
  user-select: none;
  min-height: 44px;
}
.tab.on { color: var(--amber); }

.tab-icon { font-size: 20px; line-height: 1; }
.tab-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

/* CHECK MARK SVG */
.chk-svg { display: none; }
.mission.dm .chk-svg { display: block; }

.gm-progress-wrap{padding:8px 14px 10px;border-top:0.5px solid var(--border);background:var(--bg3);}
.gm-progress-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.gm-num-in{font-size:14px;font-weight:600;font-family:-apple-system,system-ui;width:70px;padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--white);outline:none;text-align:center;font-variant-numeric:tabular-nums;-webkit-appearance:none;}
.gm-num-in:focus{border-color:var(--amber);}
.gm-goal-lbl{font-size:12px;color:var(--muted);font-weight:500;}
.gm-bar-wrap{display:flex;align-items:center;gap:8px;}
.gm-bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.gm-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--amber),#fbbf24);transition:width 0.3s ease;}
.gm-bar-fill.done{background:linear-gradient(90deg,var(--green),#4ade80);}
.gm-pct-lbl{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--amber);min-width:34px;text-align:right;}
.gm-pct-lbl.done{color:var(--green);}
.gm-quick-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.gm-qb{font-size:11px;font-weight:600;font-family:inherit;padding:5px 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;min-height:30px;}
.gm-qb:active{background:var(--border);}
.gm-qb.done-btn{color:var(--green);border-color:rgba(34,197,94,.3);}
</style>
</head>

</div>

const AC={wbc:'#60a5fa',xp:'#f0a500',affinity:'#a78bfa',themed:'#f472b6',multi:'#22c55e',corner:'#fb923c'};
const TL={wbc:'WBC',xp:'XP Path',affinity:'Team Affinity',themed:'Themed',multi:'Multiplayer',corner:'Cornerstone'};
const CHK=`<svg class="chk-svg" width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const NF=n=>Number(n).toLocaleString();
const NS=n=>n>=1000?(n>=100000?(n/1000).toFixed(0)+'k':(n/1000).toFixed(1)+'k'):String(n);

let checked=JSON.parse(localStorage.getItem('ddp26c')||'{}');
let xpv=JSON.parse(localStorage.getItem('ddp26x')||'{}');
let notes=JSON.parse(localStorage.getItem('ddp26n')||'{}');
let expanded=JSON.parse(localStorage.getItem('ddp26e')||'{}');
let pinnedProgs=JSON.parse(localStorage.getItem('ddp26pp')||'{}');
let pinnedMissions=JSON.parse(localStorage.getItem('ddp26pm')||'{}');
let missionProg=JSON.parse(localStorage.getItem('ddp26mp')||'{}');
let filter='all';
const save=()=>{localStorage.setItem('ddp26c',JSON.stringify(checked));localStorage.setItem('ddp26x',JSON.stringify(xpv));localStorage.setItem('ddp26n',JSON.stringify(notes));localStorage.setItem('ddp26e',JSON.stringify(expanded));localStorage.setItem('ddp26pp',JSON.stringify(pinnedProgs));localStorage.setItem('ddp26pm',JSON.stringify(pinnedMissions));localStorage.setItem('ddp26mp',JSON.stringify(missionProg));};

function calcProg(p){
  if(p.unit==='xp') return Math.min(xpv[p.id]||0,p.max);
  let t=0;for(const g of p.groups)for(const m of g.ms)if(m.pts&&checked[p.id+'|'+m.id])t+=m.pts;
  return Math.min(t,p.max);
}
const isDone=p=>calcProg(p)>=p.max;

function renderCard(p){
  const cur=calcProg(p),pct=Math.min(100,Math.round(cur/p.max*100)),done=isDone(p),ac=AC[p.type]||'#60a5fa';
  const isExp=expanded[p.id];

  const ticks=p.rewards.map(r=>`<div class="tick" style="left:${Math.round(r.p/p.max*100)}%"></div>`).join('');
  const firstNext=p.rewards.find(r=>Math.round(r.p/p.max*100)>pct);
  const rws=p.rewards.map(r=>{
    const rp=Math.round(r.p/p.max*100),hit=pct>=rp,nxt=firstNext&&r.p===firstNext.p;
    const parts=r.l.split(' ');
    return `<div class="rw ${r.r} ${hit?'hit':''} ${nxt?'next':''}"><span class="rw-ovr">${parts[0]}</span><span>${parts.slice(1).join(' ')}</span></div>`;
  }).join('');

  // Mission content
  let missContent='';
  const totalMissions=p.groups.reduce((a,g)=>a+g.ms.filter(m=>m.pts).length,0);
  const doneMissions=p.groups.reduce((a,g)=>a+g.ms.filter(m=>m.pts&&checked[p.id+'|'+m.id]).length,0);

  if(p.unit==='xp'&&p.id!=='xp-1'){
    missContent=`<div class="xp-section">
      <div class="xp-row">
        <input class="xp-in" type="number" inputmode="numeric" min="0" max="${p.max}" value="${xpv[p.id]||0}" placeholder="0" oninput="setXP('${p.id}',this.value)">
        <span class="xp-lbl">/ ${NF(p.max)} XP</span>
      </div>
      <div class="quick-row">
        <button class="qb" onclick="addXP('${p.id}',1000)">+1k</button>
        <button class="qb" onclick="addXP('${p.id}',2000)">+2k</button>
        <button class="qb" onclick="addXP('${p.id}',4000)">+4k</button>
        <button class="qb" onclick="setXP('${p.id}',${p.max})" style="color:var(--green)">Max</button>
        <button class="qb" onclick="setXP('${p.id}',0)" style="color:var(--red)">Reset</button>
      </div>
    </div>`;
  } else if(p.id==='xp-1'){
    const xp=xpv['xp-1']||0;
    missContent=p.groups.map(g=>`<div class="mg"><div class="mg-lbl">${g.lbl}</div>${g.ms.map(m=>{const k=p.id+'|'+m.id,c=checked[k];return`<div class="mission ${c?'dm':''}" onclick="toggle('${p.id}','${m.id}')"><div class="m-chk">${c?CHK:''}</div><div class="m-lbl">${m.label}</div></div>`;}).join('')}</div>`).join('')
    +`<div class="xp-section">
      <div class="xp-row">
        <input class="xp-in" type="number" inputmode="numeric" min="0" max="500000" value="${xp}" placeholder="0" oninput="setXP('xp-1',this.value)">
        <span class="xp-lbl">/ 500k XP</span>
      </div>
      <div class="quick-row">
        <button class="qb" onclick="addXP('xp-1',10000)">+10k</button>
        <button class="qb" onclick="addXP('xp-1',25000)">+25k</button>
        <button class="qb" onclick="addXP('xp-1',50000)">+50k</button>
        <button class="qb" style="color:var(--muted);font-size:10px">Exp Apr 10</button>
      </div>
    </div>`;
  } else {
    missContent=p.groups.map(g=>`<div class="mg"><div class="mg-lbl">${g.lbl}</div>${g.ms.map(m=>{const k=p.id+'|'+m.id,c=checked[k],hp=!!m.pts;const mpk=p.id+'||'+m.id,mpin=pinnedMissions[mpk];return`<div class="mission ${c?'dm':''}" onclick="${hp?`toggle('${p.id}','${m.id}')`:''}" style="${!hp?'cursor:default':''}"><div class="m-chk">${c?CHK:''}</div><div class="m-lbl">${m.label}${m.rep?'<span class="m-rep">REPEATABLE</span>':''}</div>${hp?`<div class="m-pts">+${m.pts}pts</div>`:''}${hp?`<div class="m-pin ${mpin?'pinned':''}" onclick="event.stopPropagation();toggleMissionPin('${p.id}','${m.id}')">📌</div>`:''}</div>`;}).join('')}</div>`).join('');
  }

  const note=notes[p.id]||'';
  const expandLabel=totalMissions>0?`${doneMissions}/${totalMissions} missions`:'Tap to expand';

  return `<div class="card ${done?'done':''}" id="card-${p.id}">
    <div class="card-header">
      <div class="card-accent" style="background:${ac}"></div>
      <div class="card-top-row">
        <div style="flex:1">
          <div class="card-name">${p.name}</div>
          ${p.sub?`<div class="card-sub-text">${p.sub}</div>`:''}
        </div>
        <span class="badge b-${p.type}">${TL[p.type]}</span>
        <div class="pin-btn ${pinnedProgs[p.id]?'pinned':''}" onclick="togglePin('${p.id}')" title="Track this program">📌</div>
      </div>
      <div class="prog-row">
        <span class="prog-cur">${NF(cur)}</span>
        <span class="prog-max">/ ${NF(p.max)} ${p.unit}</span>
        <span class="prog-pct">${pct}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:${pct}%;background:linear-gradient(90deg,${ac},color-mix(in srgb,${ac} 55%,white))"></div>
        ${ticks}
      </div>
      <div class="rewards">${rws}</div>
    </div>
    <button class="card-expand-btn" onclick="toggleExpand('${p.id}')">
      <span class="expand-label">
        ${done?'<span style="color:var(--green)">✓ Complete</span>':expandLabel}
      </span>
      <span class="expand-chevron ${isExp?'open':''}">▾</span>
    </button>
    <div class="missions-wrap ${isExp?'open':''}" id="mw-${p.id}">
      ${missContent}
      <div class="notes-section">
        <textarea class="notes-in" placeholder="Notes — next target, tips..." onchange="setNote('${p.id}',this.value)">${note}</textarea>
      </div>
    </div>
  </div>`;
}

function getList(){
  if(filter==='incomplete') return PROGS.filter(p=>!isDone(p));
  if(filter==='all') return PROGS;
  return PROGS.filter(p=>p.type===filter);
}

function render(){
  if(filter==='grind'){renderGrind();updateH();return;}
  const list=getList(),el=document.getElementById('scroll');
  const order=['wbc','xp','themed','multi','corner','affinity'];
  if(filter==='all'){
    const g={};list.forEach(p=>{(g[p.type]=g[p.type]||[]).push(p);});
    el.innerHTML=order.filter(t=>g[t]).map(t=>`<div class="sec-head">${TL[t]} (${g[t].length})</div>${g[t].map(renderCard).join('')}`).join('');
  } else {
    el.innerHTML=list.map(renderCard).join('');
  }
  updateH();
}

function updateH(){
  document.getElementById('h-prog').textContent=PROGS.length;
  document.getElementById('h-done').textContent=PROGS.filter(p=>isDone(p)).length;
  document.getElementById('h-miss').textContent=Object.values(checked).filter(Boolean).length;
}

function toggleExpand(id){
  expanded[id]=!expanded[id];save();
  const mw=document.getElementById('mw-'+id);
  const btn=mw?.previousElementSibling?.querySelector('.expand-chevron');
  if(mw) mw.classList.toggle('open',expanded[id]);
  if(btn) btn.classList.toggle('open',expanded[id]);
}

function toggle(pid,mid){const k=pid+'|'+mid;checked[k]=!checked[k];save();refreshCard(pid);updateH();}
function setXP(id,v){const p=PROGS.find(x=>x.id===id);xpv[id]=Math.max(0,Math.min(parseInt(v)||0,p?.max||999999));save();refreshCard(id);updateH();}
function addXP(id,a){const p=PROGS.find(x=>x.id===id);xpv[id]=Math.min((xpv[id]||0)+a,p?.max||999999);save();refreshCard(id);updateH();}
function setNote(id,v){notes[id]=v;save();}

function refreshCard(id){
  const p=PROGS.find(x=>x.id===id);if(!p)return;
  const el=document.getElementById('card-'+id);if(!el)return;
  const t=document.createElement('div');t.innerHTML=renderCard(p);el.replaceWith(t.firstElementChild);
}

function setF(f,btn){
  filter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(btn){
    if(btn.classList.contains('chip')) btn.classList.add('on');
    if(btn.classList.contains('tab')) btn.classList.add('on');
  }
  // sync chip + tab
  const chipMap={'all':0,'wbc':1,'xp':2,'affinity':3,'incomplete':4};
  const tabMap={'all':0,'wbc':1,'xp':2,'affinity':3,'incomplete':4};
  const chips=document.querySelectorAll('.chip');
  const tabs=document.querySelectorAll('.tab');
  const chipIdx=['all','wbc','xp','affinity','themed','multi','incomplete','grind'].indexOf(f);
  const tabIdx=['all','wbc','xp','affinity','incomplete','grind'].indexOf(f);
  if(chipIdx>=0) chips[chipIdx]?.classList.add('on');
  if(tabIdx>=0) tabs[tabIdx]?.classList.add('on');
  render();
}

function togglePin(id){pinnedProgs[id]=!pinnedProgs[id];save();refreshCard(id);updateH();}
function toggleMissionPin(pid,mid){const k=pid+'||'+mid;pinnedMissions[k]=!pinnedMissions[k];save();refreshCard(pid);}

function gmProgressHTML(pid, mid, m){
  const mk = pid+'||'+mid;
  const cur = missionProg[mk] || 0;
  // Try to parse goal number from mission label
  const goalMatch = m.label.match(/(\d+)/);
  const goal = goalMatch ? parseInt(goalMatch[0]) : null;
  const pct = goal ? Math.min(100, Math.round(cur/goal*100)) : 0;
  const done = checked[pid+'|'+mid];

  let quickBtns = '';
  if(goal){
    const increments = goal<=5?[1]:goal<=20?[1,5]:goal<=50?[5,10]:goal<=100?[10,25]:[10,25,50];
    quickBtns = increments.map(n=>`<button class="gm-qb" onclick="setMProg('${pid}','${mid}',${n},${goal})">+${n}</button>`).join('');
    quickBtns += `<button class="gm-qb done-btn" onclick="setMProg('${pid}','${mid}',${goal},${goal})">Done ✓</button>`;
  }

  return `<div class="gm-progress-wrap">
    <div class="gm-progress-row">
      <input class="gm-num-in" type="number" inputmode="numeric" min="0" ${goal?'max="'+goal+'"':''} value="${cur}" placeholder="0"
        oninput="setMProgInput('${pid}','${mid}',this.value,${goal||0})">
      ${goal?`<span class="gm-goal-lbl">of ${goal}</span>`:''}
    </div>
    ${goal?`<div class="gm-bar-wrap">
      <div class="gm-bar-track"><div class="gm-bar-fill ${pct>=100?'done':''}" style="width:${pct}%" id="gmb-${pid}-${mid}"></div></div>
      <span class="gm-pct-lbl ${pct>=100?'done':''}" id="gmp-${pid}-${mid}">${pct>=100?'✓ Done':pct+'%'}</span>
    </div>`:''}
    ${quickBtns?`<div class="gm-quick-row">${quickBtns}</div>`:''}
  </div>`;
}

function setMProg(pid,mid,add,goal){
  const mk=pid+'||'+mid;
  missionProg[mk]=Math.min((missionProg[mk]||0)+add,goal);
  if(goal&&missionProg[mk]>=goal&&!checked[pid+'|'+mid]){checked[pid+'|'+mid]=true;}
  save();renderGrind();
}
function setMProgInput(pid,mid,val,goal){
  const mk=pid+'||'+mid;
  missionProg[mk]=Math.max(0,goal?Math.min(parseInt(val)||0,goal):parseInt(val)||0);
  if(goal&&missionProg[mk]>=goal&&!checked[pid+'|'+mid]){checked[pid+'|'+mid]=true;}
  save();
  // update bar without full re-render
  const pct=goal?Math.min(100,Math.round(missionProg[mk]/goal*100)):0;
  const bar=document.getElementById('gmb-'+pid+'-'+mid);
  const lbl=document.getElementById('gmp-'+pid+'-'+mid);
  if(bar){bar.style.width=pct+'%';bar.classList.toggle('done',pct>=100);}
  if(lbl){lbl.textContent=pct>=100?'✓ Done':pct+'%';lbl.classList.toggle('done',pct>=100);}
}

function renderGrind(){
  const el=document.getElementById('scroll');
  const pinnedProgIds=Object.keys(pinnedProgs).filter(id=>pinnedProgs[id]);
  const pinnedMissionKeys=Object.keys(pinnedMissions).filter(k=>pinnedMissions[k]);

  // Build a list: pinned programs (show all their pinned missions + progress)
  // Plus any pinned missions from non-pinned programs
  const blocks=[];

  // All pinned programs
  pinnedProgIds.forEach(pid=>{
    const p=PROGS.find(x=>x.id===pid);if(!p)return;
    const cur=calcProg(p),pct=Math.min(100,Math.round(cur/p.max*100));
    const ac=AC[p.type]||'#60a5fa';
    // Get pinned missions for this prog
    const progPinnedMs=pinnedMissionKeys.filter(k=>k.startsWith(pid+'||')).map(k=>k.split('||')[1]);
    let missHTML='';
    if(progPinnedMs.length){
      p.groups.forEach(g=>g.ms.forEach(m=>{
        if(!progPinnedMs.includes(m.id)||!m.pts)return;
        const c=checked[pid+'|'+m.id];
        missHTML+=`<div>
          <div class="grind-mission ${c?'dm':''}" onclick="toggle('${pid}','${m.id}');renderGrind()">
            <div class="m-chk">${c?CHK:''}</div>
            <div class="gm-lbl">${m.label}</div>
            <div class="gm-pts">+${m.pts}pts</div>
          </div>
          ${gmProgressHTML(pid,m.id,m)}
        </div>`;
      }));
    } else {
      // Show all incomplete missions with pts
      let shown=0;
      p.groups.forEach(g=>g.ms.forEach(m=>{
        if(!m.pts||checked[pid+'|'+m.id]||shown>=5)return;
        shown++;
        missHTML+=`<div>
          <div class="grind-mission" onclick="toggle('${pid}','${m.id}');renderGrind()">
            <div class="m-chk"></div>
            <div class="gm-lbl">${m.label}</div>
            <div class="gm-pts">+${m.pts}pts</div>
          </div>
          ${gmProgressHTML(pid,m.id,m)}
        </div>`;
      }));
    }
    blocks.push(`<div class="grind-prog-block">
      <div class="grind-prog-header" style="border-left:3px solid ${ac};padding-left:11px">
        <div class="grind-prog-name">${p.name}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px">
          <div class="track" style="flex:1;height:4px"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,${ac},color-mix(in srgb,${ac} 55%,white))"></div></div>
          <span style="font-size:12px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums">${pct}%</span>
        </div>
      </div>
      ${missHTML||'<div style="padding:10px 14px;font-size:12px;color:var(--muted)">All missions complete or none pinned.</div>'}
    </div>`);
  });

  // Pinned missions from non-pinned programs
  const orphanMs=pinnedMissionKeys.filter(k=>{const pid=k.split('||')[0];return !pinnedProgs[pid];});
  if(orphanMs.length){
    let orphanHTML='';
    orphanMs.forEach(k=>{
      const [pid,mid]=k.split('||');
      const p=PROGS.find(x=>x.id===pid);if(!p)return;
      let m;p.groups.forEach(g=>g.ms.forEach(x=>{if(x.id===mid)m=x;}));
      if(!m||!m.pts)return;
      const c=checked[pid+'|'+mid];
      orphanHTML+=`<div>
        <div class="grind-mission ${c?'dm':''}" onclick="toggle('${pid}','${mid}');renderGrind()">
          <div class="m-chk">${c?CHK:''}</div>
          <div class="gm-lbl">${m.label}</div>
          <span class="gm-prog-tag">${p.name}</span>
          <div class="gm-pts">+${m.pts}pts</div>
        </div>
        ${gmProgressHTML(pid,mid,m)}
      </div>`;
    });
    if(orphanHTML) blocks.push(`<div class="grind-prog-block"><div class="grind-prog-header"><div class="grind-prog-name">📌 Pinned Tasks</div></div>${orphanHTML}</div>`);
  }

  if(!blocks.length){
    el.innerHTML=`<div class="grind-empty">
      <div class="grind-empty-icon">📌</div>
      <div class="grind-empty-title">Nothing tracked yet</div>
      <div class="grind-empty-sub">Tap the 📌 icon on any program or individual mission to add it to your grind list.</div>
    </div>`;
  } else {
    el.innerHTML=blocks.join('');
  }
}


render();
</script>
</body>
</html>
